upstream sdl_api {
    server api:3003;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the shell HTML
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
    }

    # Long-term cache for hashed CRA static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|json|map)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Proxy API — keep /api prefix (Express routes are /api/*)
    location /api {
        proxy_pass http://sdl_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
